<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Da Cuts Bookings</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#C9A96E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Da Cuts Admin" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- PASSWORD GATE -->
  <div class="admin-gate" id="adminGate">
    <div class="admin-gate__box">
      <span class="admin-gate__logo">Da <em>Cuts</em></span>
      <h1>Admin Access</h1>
      <p>Enter your admin password to continue</p>
      <div class="form-group" style="width:100%">
        <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password" />
      </div>
      <button class="btn btn--gold btn--full" id="adminLogin">Enter ↗</button>
      <p class="admin-gate__error" id="adminError"></p>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div class="admin-dash" id="adminDash" style="display:none">

    <header class="admin-header">
      <div class="admin-header__left">
        <span class="admin-logo">Da <em>Cuts</em></span>
        <span class="admin-badge">Admin</span>
      </div>
      <div class="admin-header__right">
        <button class="admin-notify-btn" id="enableNotifications">🔔 Enable Notifications</button>
        <button class="btn btn--ghost" id="adminLogout" style="padding:8px 16px;font-size:11px">Sign Out</button>
      </div>
    </header>

    <main class="admin-main">

      <!-- STATS ROW -->
      <div class="admin-stats">
        <div class="admin-stat">
          <span class="admin-stat__num" id="statTotal">—</span>
          <span class="admin-stat__label">Total Bookings</span>
        </div>
        <div class="admin-stat">
          <span class="admin-stat__num" id="statToday">—</span>
          <span class="admin-stat__label">Today</span>
        </div>
        <div class="admin-stat">
          <span class="admin-stat__num" id="statPending">—</span>
          <span class="admin-stat__label">Pending</span>
        </div>
        <div class="admin-stat">
          <span class="admin-stat__num" id="statThisWeek">—</span>
          <span class="admin-stat__label">This Week</span>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="admin-filters">
        <div class="admin-filters__left">
          <button class="admin-filter-btn active" data-filter="all">All</button>
          <button class="admin-filter-btn" data-filter="pending">Pending</button>
          <button class="admin-filter-btn" data-filter="confirmed">Confirmed</button>
          <button class="admin-filter-btn" data-filter="cancelled">Cancelled</button>
        </div>
        <div class="admin-search">
          <input type="text" id="adminSearch" placeholder="Search by name or service…" />
        </div>
      </div>

      <!-- BOOKINGS LIST -->
      <div class="admin-bookings" id="adminBookings">
        <div class="admin-loading">Loading bookings…</div>
      </div>

    </main>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
